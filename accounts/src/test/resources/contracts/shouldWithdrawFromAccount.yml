description: "POST /accounts/{login}/withdraw с SCOPE_accounts.write уменьшает баланс"

request:
  method: POST
  url: /accounts/user1/withdraw
  headers:
    Content-Type: application/json
    Authorization: Bearer test-token
  body:
    amount: 50.00
  matchers:
    body:
      - path: $.amount
        type: by_regex
        value: "[0-9]+\\.?[0-9]*"

response:
  status: 200
  headers:
    Content-Type: application/json
  body:
    login: user1
    balance: 450.00
  matchers:
    body:
      - path: $.login
        type: by_regex
        value: "[a-zA-Z0-9_]+"
      - path: $.balance
        type: by_regex
        value: "[0-9]+\\.?[0-9]*"
