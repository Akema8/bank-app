input {
  tcp {
    port => 5044
    codec => json_lines
  }
}

filter {
  date {
    match => ["@timestamp", "ISO8601"]
  }

  mutate {
    rename => { "service" => "[fields][service]" }
    rename => { "level"   => "[fields][level]" }
    rename => { "logger_name" => "[fields][logger]" }
    rename => { "thread_name" => "[fields][thread]" }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "bank-app-%{[fields][service]}-%{+YYYY.MM.dd}"
  }
}
