spring:
  application:
    name: notifications
  config:
    import: "optional:zookeeper:"
  cloud:
    zookeeper:
      connect-string: ${ZK_HOST:localhost:2181}
      config:
        enabled: true
  kafka:
    consumer:
      group-id: notifications-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "ru.yandex.practicum.common.kafka.dto"
        spring.json.value.default.type: "ru.yandex.practicum.notifications.dto.NotificationEvent"
    listener:
      observation-enabled: true

server:
  port: 8083

eureka:
  instance:
    prefer-ip-address: true

kafka:
  topic:
    notifications: notifications

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:zipkin}:9411/api/v2/spans
