description: "POST /notifications с валидным телом и токеном возвращает 202"

request:
  method: POST
  url: /notifications
  headers:
    Content-Type: application/json
    Authorization: Bearer test-token
  body:
    login: user1
    message: "Пополнение счёта: +100"
  matchers:
    body:
      - path: $.login
        type: by_regex
        value: "[a-zA-Z0-9_]+"
      - path: $.message
        type: by_regex
        value: ".+"

response:
  status: 202