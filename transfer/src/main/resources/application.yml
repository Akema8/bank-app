spring:
  application:
    name: transfer
  config:
    import: "optional:zookeeper:"
  cloud:
    zookeeper:
      connect-string: ${ZK_HOST:localhost:2181}
      config:
        enabled: true
  r2dbc:
    url: ${DB_URL:r2dbc:mysql://localhost:3306/transfer}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  security:
    oauth2:
      client:
        registration:
          transfer-client:
            client-id: transfer-client
            client-secret: transfer-secret
            authorization-grant-type: client_credentials
            scope: accounts.write
        provider:
          transfer-client:
            token-uri: ${AUTH_SERVER_URL:http://auth-server:9000}/oauth2/token
  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      properties:
        spring.json.add.type.headers: false

kafka:
  topic:
    notifications: notifications

server:
  port: 8085
  error:
    include-message: always

eureka:
  instance:
    prefer-ip-address: true
