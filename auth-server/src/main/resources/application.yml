spring:
  application:
    name: auth-server

server:
  port: 9000
  servlet:
    session:
      cookie:
        name: AUTHSERVERSESSIONID

management:
  server:
    port: 9001
  endpoints:
    web:
      exposure:
        include: users

auth:
  issuer-uri: ${ISSUER_URI:http://localhost:9000}

bank-web:
  redirect-uri: ${BANK_WEB_REDIRECT_URI:http://localhost:8080/login/oauth2/code/bank-web}
