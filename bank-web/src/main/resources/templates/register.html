<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="utf-8">
    <title>Банк — Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-light">
<div class="container p-4" style="max-width: 480px;">

    <div class="hstack gap-3 mb-4">
        <h2><span class="badge text-bg-info text-white">Банк</span></h2>
        <span class="text-muted">Регистрация</span>
    </div>

    <div class="alert alert-danger" th:if="${error != null}" th:text="${error}"></div>

    <div class="card">
        <div class="card-body">
            <form method="post" action="/register">

                <div class="mb-3">
                    <label for="login" class="form-label">Логин</label>
                    <input type="text" class="form-control" id="login" name="login"
                           placeholder="ivanov" th:value="${login}" required>
                </div>

                <div class="mb-3">
                    <label for="name" class="form-label">Фамилия Имя</label>
                    <input type="text" class="form-control" id="name" name="name"
                           placeholder="Иванов Иван" th:value="${name}" required>
                </div>

                <div class="mb-3">
                    <label for="birthdate" class="form-label">Дата рождения</label>
                    <input type="date" class="form-control" id="birthdate" name="birthdate"
                           th:value="${birthdate}" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
            </form>
        </div>
    </div>

    <div class="text-center mt-3">
        <a href="/account" class="text-muted small">Уже есть аккаунт? Перейти на главную</a>
    </div>

</div>
</body>
</html>
