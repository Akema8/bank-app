# MySQL
mysql:
  enabled: true
  rootPassword: secret        # ← меняй здесь; синхронизируй с *.db.password ниже

# Auth Server
auth-server:
  enabled: true
  service:
    nodePort: 30900
  issuerUri: "http://localhost:30900"
  redirectUri: "http://localhost:30800/login/oauth2/code/bank-web"

# Kafka
kafka:
  enabled: true

# Zipkin
zipkin:
  enabled: true

# Prometheus
prometheus:
  enabled: true

# Grafana
grafana:
  enabled: true

# ELK (снаружи кластера, подключается через ExternalName Service)
elk:
  enabled: true
  logstashHost: host.docker.internal  # Rancher Desktop / Docker Desktop

# Backend сервисы
accounts:
  enabled: true
  db:
    password: secret
  kafka:
    bootstrapServers: "kafka:9092"

cash:
  enabled: true
  db:
    password: secret
  kafka:
    bootstrapServers: "kafka:9092"

transfer:
  enabled: true
  db:
    password: secret
  kafka:
    bootstrapServers: "kafka:9092"

notifications:
  enabled: true
  kafka:
    bootstrapServers: "kafka:9092"

gateway:
  enabled: true

# Frontend
bank-web:
  enabled: true
  service:
    nodePort: 30800
  authServer:
    externalUri: "http://localhost:30900"