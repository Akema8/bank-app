apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cash.name" . }}
  labels:
    {{- include "cash.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cash.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cash.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: cash
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "cash.name" . }}
            - secretRef:
                name: {{ include "cash.name" . }}
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4