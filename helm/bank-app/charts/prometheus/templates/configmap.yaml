apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "prometheus.name" . }}-config
  labels:
    {{- include "prometheus.labels" . | nindent 4 }}
data:
  prometheus.yml: |
    global:
      scrape_interval: {{ .Values.scrape.interval }}
      scrape_timeout: {{ .Values.scrape.timeout }}

    rule_files:
      - /etc/prometheus/rules.yml

    scrape_configs:
      - job_name: accounts
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["accounts:8082"]

      - job_name: cash
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["cash:8084"]

      - job_name: transfer
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["transfer:8085"]

      - job_name: notifications
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["notifications:8083"]

      - job_name: gateway
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["gateway:8090"]

      - job_name: bank-web
        metrics_path: /actuator/prometheus
        static_configs:
          - targets: ["bank-web:8080"]
