apiVersion: v1
kind: Service
metadata:
  name: {{ include "auth-server.name" . }}
  labels:
    {{- include "auth-server.labels" . | nindent 4 }}
spec:
  type: NodePort
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      nodePort: {{ .Values.service.nodePort }}
  selector:
    {{- include "auth-server.selectorLabels" . | nindent 4 }}