apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "auth-server.name" . }}-test-connection"
  labels:
    {{- include "auth-server.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: test-oidc
      image: curlimages/curl:latest
      imagePullPolicy: IfNotPresent
      command:
        - sh
        - -c
        - |
          curl -sf http://{{ include "auth-server.name" . }}:{{ .Values.service.port }}/.well-known/openid-configuration \
            | grep -q "{{ .Values.issuerUri }}"