apiVersion: v1
kind: Service
metadata:
  name: {{ include "transfer.name" . }}
  labels:
    {{- include "transfer.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "transfer.selectorLabels" . | nindent 4 }}