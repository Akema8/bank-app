apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "transfer.name" . }}-test-connection"
  labels:
    {{- include "transfer.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: curlimages/curl:latest
      imagePullPolicy: IfNotPresent
      command:
        - sh
        - -c
        - curl -sf http://{{ include "transfer.name" . }}:{{ .Values.service.port }}/actuator/health