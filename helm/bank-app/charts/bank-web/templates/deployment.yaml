apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "bank-web.name" . }}
  labels:
    {{- include "bank-web.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "bank-web.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "bank-web.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: bank-web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "bank-web.name" . }}
          readinessProbe:
            httpGet:
              path: /register
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 90
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 4