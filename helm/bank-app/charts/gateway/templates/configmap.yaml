apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gateway.name" . }}
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
data:
  EUREKA_CLIENT_ENABLED: "false"
  SPRING_CLOUD_ZOOKEEPER_ENABLED: "false"
  ACCOUNTS_URI: {{ .Values.routes.accountsUri | quote }}
  CASH_URI: {{ .Values.routes.cashUri | quote }}
  TRANSFER_URI: {{ .Values.routes.transferUri | quote }}
  SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: "http://auth-server:9000/oauth2/jwks"
  LOGSTASH_HOST: logstash