apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "gateway.name" . }}-test-connection"
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: curlimages/curl:latest
      imagePullPolicy: IfNotPresent
      command:
        - sh
        - -c
        - |
          curl -sf http://{{ include "gateway.name" . }}:{{ .Values.service.port }}/actuator/health && \
          curl -sf -o /dev/null -w "%{http_code}" \
            http://{{ include "gateway.name" . }}:{{ .Values.service.port }}/accounts/register \
            | grep -qE "^(200|401|403|405)$"