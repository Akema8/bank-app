apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "grafana.name" . }}-dashboard
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
data:
  bank-app.json: |
    {
      "title": "Bank App",
      "uid": "bank-app",
      "schemaVersion": 39,
      "refresh": "15s",
      "time": { "from": "now-30m", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "service",
            "type": "query",
            "datasource": "Prometheus",
            "query": "label_values(jvm_memory_used_bytes, job)",
            "multi": true,
            "includeAll": true,
            "current": { "text": "All", "value": "$__all" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "HTTP RPS",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{job=~\"$service\"}[1m])) by (job, uri)",
              "legendFormat": "{{`{{job}}`}} {{`{{uri}}`}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "HTTP P99 Latency",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket{job=~\"$service\"}[1m])) by (job, le))",
              "legendFormat": "{{`{{job}}`}} p99"
            }
          ]
        },
        {
          "id": 3,
          "title": "HTTP 5xx Errors",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{job=~\"$service\", status=~\"5..\"}[1m])) by (job)",
              "legendFormat": "{{`{{job}}`}} 5xx"
            }
          ]
        },
        {
          "id": 4,
          "title": "JVM Heap Used",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "jvm_memory_used_bytes{job=~\"$service\", area=\"heap\"}",
              "legendFormat": "{{`{{job}}`}}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } }
        },
        {
          "id": 5,
          "title": "Withdraw Failures",
          "type": "stat",
          "gridPos": { "x": 0, "y": 16, "w": 8, "h": 6 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(increase(cash_withdraw_failures_total[1h]))",
              "legendFormat": "Withdraw failures (1h)"
            }
          ],
          "options": { "colorMode": "background" },
          "fieldConfig": { "defaults": { "thresholds": { "steps": [
            { "color": "green", "value": 0 },
            { "color": "yellow", "value": 5 },
            { "color": "red", "value": 20 }
          ] } } }
        },
        {
          "id": 6,
          "title": "Transfer Failures",
          "type": "stat",
          "gridPos": { "x": 8, "y": 16, "w": 8, "h": 6 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(increase(transfer_failures_total[1h]))",
              "legendFormat": "Transfer failures (1h)"
            }
          ],
          "options": { "colorMode": "background" },
          "fieldConfig": { "defaults": { "thresholds": { "steps": [
            { "color": "green", "value": 0 },
            { "color": "yellow", "value": 3 },
            { "color": "red", "value": 10 }
          ] } } }
        },
        {
          "id": 7,
          "title": "Notification Send Failures",
          "type": "stat",
          "gridPos": { "x": 16, "y": 16, "w": 8, "h": 6 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(increase(notification_send_failures_total[1h]))",
              "legendFormat": "Kafka failures (1h)"
            }
          ],
          "options": { "colorMode": "background" },
          "fieldConfig": { "defaults": { "thresholds": { "steps": [
            { "color": "green", "value": 0 },
            { "color": "yellow", "value": 1 },
            { "color": "red", "value": 5 }
          ] } } }
        },
        {
          "id": 8,
          "title": "R2DBC Active Connections",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 22, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "r2dbc_pool_acquired_connections{job=~\"$service\"}",
              "legendFormat": "{{`{{job}}`}} acquired"
            },
            {
              "expr": "r2dbc_pool_pending_connections{job=~\"$service\"}",
              "legendFormat": "{{`{{job}}`}} pending"
            }
          ]
        },
        {
          "id": 9,
          "title": "Kafka Producer Record Rate",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 22, "w": 12, "h": 8 },
          "datasource": "Prometheus",
          "targets": [
            {
              "expr": "sum(rate(kafka_producer_record_send_total{job=~\"$service\"}[1m])) by (job)",
              "legendFormat": "{{`{{job}}`}} records/s"
            }
          ]
        }
      ]
    }
