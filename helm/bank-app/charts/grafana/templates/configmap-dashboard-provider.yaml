apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "grafana.name" . }}-dashboard-provider
  labels:
    {{- include "grafana.labels" . | nindent 4 }}
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: bank-app
        type: file
        disableDeletion: true
        editable: false
        options:
          path: /var/lib/grafana/dashboards
