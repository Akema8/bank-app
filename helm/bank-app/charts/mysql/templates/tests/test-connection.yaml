apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "mysql.name" . }}-test-connection"
  labels:
    {{- include "mysql.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: mysql-client
      image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
      command:
        - sh
        - -c
        - |
          mysql -h {{ include "mysql.name" . }} -u root -p${MYSQL_ROOT_PASSWORD} \
            -e 'SHOW DATABASES;' | grep -E 'accounts|cash|transfer'
      env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "mysql.name" . }}
              key: root-password