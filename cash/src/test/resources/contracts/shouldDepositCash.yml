description: "POST /cash/deposit с SCOPE_cash.write возвращает обновлённый AccountDto"

request:
  method: POST
  url: /cash/deposit
  headers:
    Content-Type: application/json
    Authorization: Bearer test-token
  body:
    amount: 100.00
  matchers:
    body:
      - path: $.amount
        type: by_regex
        value: "[0-9]+\\.?[0-9]*"

response:
  status: 200
  headers:
    Content-Type: application/json
  body:
    login: user1
    balance: 600.00
  matchers:
    body:
      - path: $.login
        type: by_regex
        value: "[a-zA-Z0-9_]+"
      - path: $.balance
        type: by_regex
        value: "[0-9]+\\.?[0-9]*"
