spring:
  application:
    name: cash
  r2dbc:
    url: ${DB_URL:r2dbc:mysql://localhost:3306/cash}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_JWK_SET_URI:http://localhost:9000/oauth2/jwks}
      client:
        registration:
          cash-client:
            client-id: cash-client
            client-secret: cash-secret
            authorization-grant-type: client_credentials
            scope: accounts.write, notifications.write
        provider:
          cash-client:
            token-uri: ${AUTH_TOKEN_URI:http://localhost:9000/oauth2/token}

server:
  port: 8084
  error:
    include-message: always

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

accounts:
  url: ${ACCOUNTS_URL:http://localhost:8082}
notifications:
  url: ${NOTIFICATIONS_URL:http://localhost:8083}
