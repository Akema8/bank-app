spring:
  application:
    name: cash
  config:
    import: "optional:zookeeper:"
  cloud:
    zookeeper:
      connect-string: ${ZK_HOST:localhost:2181}
      config:
        enabled: true
  r2dbc:
    url: ${DB_URL:r2dbc:mysql://localhost:3306/cash}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  security:
    oauth2:
      client:
        registration:
          cash-client:
            client-id: cash-client
            client-secret: cash-secret
            authorization-grant-type: client_credentials
            scope: accounts.write, notifications.write
        provider:
          cash-client:
            token-uri: ${AUTH_SERVER_URL:http://auth-server:9000}/oauth2/token

server:
  port: 8084
  error:
    include-message: always

eureka:
  instance:
    prefer-ip-address: true
