services:

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: accounts
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 10

  eureka-server:
    build: ./eureka-server
    ports:
      - "8761:8761"

  auth-server:
    build: ./auth-server
    ports:
      - "9000:9000"
    environment:
      ISSUER_URI: http://localhost:9000
      BANK_WEB_REDIRECT_URI: http://localhost:8080/login/oauth2/code/bank-web
    depends_on:
      - eureka-server

  accounts:
    build: ./accounts
    ports:
      - "8082:8082"
    environment:
      DB_URL: r2dbc:mysql://mysql:3306/accounts
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      AUTH_JWK_SET_URI: http://auth-server:9000/oauth2/jwks
      EUREKA_URL: http://eureka-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      auth-server:
        condition: service_started
      eureka-server:
        condition: service_started

  gateway:
    build: ./gateway
    ports:
      - "8090:8090"
    environment:
      AUTH_JWK_SET_URI: http://auth-server:9000/oauth2/jwks
      EUREKA_URL: http://eureka-server:8761/eureka/
    depends_on:
      - eureka-server
      - auth-server

  bank-web:
    build: ./bank-web
    ports:
      - "8080:8080"
    environment:
      GATEWAY_URL: http://gateway:8090
      AUTH_URL: http://auth-server:9000
      AUTH_AUTHORIZATION_URI: http://localhost:9000/oauth2/authorize
      AUTH_TOKEN_URI: http://auth-server:9000/oauth2/token
      AUTH_JWK_SET_URI: http://auth-server:9000/oauth2/jwks
      AUTH_USERINFO_URI: http://auth-server:9000/userinfo
    depends_on:
      - auth-server
      - gateway

volumes:
  mysql_data:
